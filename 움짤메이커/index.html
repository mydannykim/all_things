<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>무료 움짤(GIF) 변환기 - 영상을 GIF로 바로 만들기</title>
<meta name="description" content="동영상을 업로드해서 원하는 구간만 잘라 무료로 GIF 움짤을 만드세요. 서버 업로드 없이 브라우저에서 바로 처리되어 안전하고 빠릅니다." />
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="site-header">
    <h1>🎬 무료 움짤(GIF) 변환기</h1>
    <p class="subtitle">영상을 업로드하고 구간만 골라 GIF로 다운로드하세요. 모든 처리는 <strong>당신의 브라우저 안에서만</strong> 일어나며, 서버에 영상이 업로드되지 않습니다.</p>
  </header>

  <main class="container">
    <section class="upload-area" id="uploadArea">
      <input type="file" id="videoInput" accept="video/*" />
      <p>여기를 클릭하거나 영상 파일을 드래그하세요 (mp4, mov, webm 등)</p>
    </section>

    <section class="editor" id="editor" hidden>
      <video id="preview" controls muted playsinline></video>

      <div class="controls">
        <label>
          시작 시간: <span id="startLabel">0.0s</span>
          <input type="range" id="startRange" min="0" max="0" step="0.1" value="0" />
        </label>
        <label>
          끝 시간: <span id="endLabel">0.0s</span>
          <input type="range" id="endRange" min="0" max="0" step="0.1" value="0" />
        </label>

        <div class="row">
          <label>
            GIF 너비(px)
            <select id="widthSelect">
              <option value="240">240 (작게, 빠름)</option>
              <option value="360" selected>360 (보통)</option>
              <option value="480">480 (크게, 느림)</option>
            </select>
          </label>
          <label>
            프레임레이트(FPS)
            <select id="fpsSelect">
              <option value="8">8 (가벼움)</option>
              <option value="10" selected>10 (기본)</option>
              <option value="15">15 (부드러움)</option>
            </select>
          </label>
        </div>

        <p class="hint">⚠️ 구간 길이는 최대 10초까지 권장해요. 너무 길면 변환이 오래 걸리고 GIF 용량이 커집니다.</p>

        <button id="convertBtn">GIF로 변환하기</button>
      </div>

      <div class="progress-wrap" id="progressWrap" hidden>
        <progress id="progressBar" value="0" max="100"></progress>
        <span id="progressLabel">0%</span>
      </div>

      <div class="result" id="result" hidden>
        <h2>완성된 GIF</h2>
        <img id="resultImg" alt="생성된 GIF 미리보기" />
        <br />
        <a id="downloadLink" download="movejjal.gif">⬇️ GIF 다운로드</a>
        <button id="resetBtn">다른 영상으로 다시 만들기</button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <nav>
      <a href="privacy.html">개인정보처리방침</a> ·
      <a href="contact.html">문의하기</a>
    </nav>
    <p>© 2026 무료 움짤 변환기. 업로드한 영상은 서버로 전송되지 않으며 브라우저 메모리에서만 처리됩니다.</p>
  </footer>

  <script src="assets/js/gif.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
